<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súper Contador Pro - Ver 2.2 (Corrección Crítica)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/annyang/2.6.1/annyang.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }

        .main-button {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .main-button:active {
            transform: scale(0.98);
            filter: brightness(1.1);
        }

        .count-display {
            font-size: clamp(8rem, 30vw, 18rem);
            font-weight: 900;
            text-shadow: 0 10px 40px rgba(0,0,0,0.4);
            line-height: 0.8;
            margin-bottom: 20px;
        }

        .instruction {
            font-size: 1.1rem;
            font-weight: 700;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }

        .mic-indicator {
            position: fixed;
            top: 25px;
            left: 25px;
            padding: 12px 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            backdrop-filter: blur(8px);
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }

        .mic-dot {
            width: 12px;
            height: 12px;
            background: #6b7280;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .active .mic-dot {
            background: #10b981;
            box-shadow: 0 0 15px #10b981;
            animation: pulse 1.5s infinite;
        }

        .error .mic-dot {
            background: #ef4444;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .bump { animation: bumpAnim 0.2s ease-out; }
        @keyframes bumpAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .version-tag {
            position: fixed;
            bottom: 20px;
            right: 25px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div id="micStatus" class="mic-indicator">
        <div id="micDot" class="mic-dot"></div>
        <span id="micLabel">Voz desactivada</span>
    </div>

    <div class="version-tag">ver. 2.2 (Estable)</div>

    <button id="mainBtn" class="main-button">
        <div id="counter" class="count-display">0</div>
        <div class="instruction">Dí "Uno" o Toca</div>
    </button>

    <script>
        let count = 0;
        let isVoiceEnabled = false;
        let isAttemptingStart = false; // Bloqueo de concurrencia
        
        const counterEl = document.getElementById('counter');
        const micStatus = document.getElementById('micStatus');
        const micLabel = document.getElementById('micLabel');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function beep() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function increment() {
            count++;
            counterEl.textContent = count;
            counterEl.classList.remove('bump');
            void counterEl.offsetWidth;
            counterEl.classList.add('bump');
            beep();
            if (navigator.vibrate) navigator.vibrate(40);
        }

        if (annyang) {
            const commands = {
                'uno': increment,
                '1': increment,
                'incrementar': increment,
                'mas': increment
            };

            annyang.addCommands(commands);
            annyang.setLanguage('es-ES');

            annyang.addCallback('start', () => {
                isAttemptingStart = false;
                micStatus.classList.add('active');
                micStatus.classList.remove('error');
                micLabel.textContent = 'Voz conectada';
            });

            annyang.addCallback('error', (err) => {
                console.warn('Estado de voz:', err.error);
                if (err.error === 'network') {
                    micLabel.textContent = 'Error de red...';
                    micStatus.classList.add('error');
                }
                isAttemptingStart = false;
            });

            annyang.addCallback('end', () => {
                isAttemptingStart = false;
                micStatus.classList.remove('active');
                
                // Reinicio automático controlado
                if (isVoiceEnabled) {
                    setTimeout(() => {
                        if (isVoiceEnabled) {
                            safeStart();
                        }
                    }, 600);
                }
            });
        }

        function safeStart() {
            if (!annyang || isAttemptingStart) return;
            
            // Verificación adicional de estado nativo para evitar colisión
            if (annyang.isListening()) {
                console.log("Ya está escuchando, omitiendo inicio.");
                return;
            }

            isAttemptingStart = true;
            try {
                // Forzamos abortar cualquier proceso fantasma antes de iniciar
                // annyang.start internamente ya gestiona esto, pero añadimos protección
                annyang.start({ autoRestart: false, continuous: false });
            } catch (e) {
                console.error("Fallo controlado al iniciar:", e);
                isAttemptingStart = false;
            }
        }

        function toggleVoice() {
            if (!annyang) return;

            isVoiceEnabled = !isVoiceEnabled;

            if (isVoiceEnabled) {
                safeStart();
            } else {
                isAttemptingStart = false;
                try {
                    annyang.abort();
                } catch(e) {}
                micStatus.classList.remove('active', 'error');
                micLabel.textContent = 'Voz desactivada';
            }
        }

        document.getElementById('mainBtn').addEventListener('click', () => {
            increment();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Si el usuario toca la pantalla, intentamos reanimar la voz si falló, 
            // pero con comprobación estricta de estado.
            if (!isVoiceEnabled) {
                toggleVoice();
            } else if (!annyang.isListening()) {
                safeStart();
            }
        });

        micStatus.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleVoice();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                increment();
            }
        });
    </script>
</body>
</html>
